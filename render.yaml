services:
  - type: web
    name: theonerec-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: ./apps/api
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: ARTIFACTS_PATH
        value: /app/artifacts
      - key: GEMINI_MODEL_ID
        value: gemini-2.0-flash
